# docker-compose.yml — for local development
# Run: docker compose up

services:
  api:
    build: .
    ports:
      - "7860:7860"
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_PORT=7860
      - DATABASE_URL=postgresql+asyncpg://kembang:kembang@db:5432/kembang
      - DATABASE_URL_SYNC=postgresql+psycopg://kembang:kembang@db:5432/kembang
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app  # hot reload for development
    command: uvicorn app.main:app --host 0.0.0.0 --port 7860 --reload

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kembang
      POSTGRES_PASSWORD: kembang
      POSTGRES_DB: kembang
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kembang"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
